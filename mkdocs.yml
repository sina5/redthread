site_name: Redthread
site_description: >-
  Portable, git-backed memory for AI agents and multi-phase pipelines —
  sync context, artifacts, and agent memory across machines through a git
  remote, with MCP support for Claude Code, Cursor, and other coding agents.
site_author: Sina Fathi-Kazerooni
site_url: https://sina5.github.io/redthread/
repo_url: https://github.com/sina5/redthread
repo_name: sina5/redthread
edit_uri: ""

exclude_docs: |
  overrides/

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Usage: usage.md
  - AGENTS.md example: agents-md.md
  - Architecture: architecture.md
  - Store format: store-format.md
  - FAQ: faq.md
